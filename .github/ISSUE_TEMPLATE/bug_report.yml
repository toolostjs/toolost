name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to improve the toolost sdk.
        Please provide enough detail for us to reproduce and fix the bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the problem.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps we can run to reproduce this behavior.
      placeholder: |
        1. Create a TooLostClient with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: toolost version
      description: Check your package manager lockfile or package.json.
      placeholder: 1.0.1
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime information
      description: Include Node.js version and OS.
      placeholder: Node 22.15.0 on Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste any relevant logs or errors.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue with the latest version.
          required: true
