name: Feature request
description: Suggest an idea or enhancement for the SDK.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please explain the problem and proposed solution in detail.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
      placeholder: I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen.
      placeholder: Add a new manager method that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or other design you evaluated.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Client
        - OAuth
        - Managers
        - Types
        - Documentation
        - Testing/Tooling
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked open issues and discussions first.
          required: true
        - label: This request is scoped to the Too Lost SDK (not the Too Lost platform itself).
          required: true
