name: Release Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify project quality
        run: |
          pnpm run typecheck
          pnpm run test
          pnpm run build

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          NORMALIZED_TAG="${RELEASE_TAG#v}"

          if [ "$NORMALIZED_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ($RELEASE_TAG) must match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Determine npm dist-tag
        id: dist_tag
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        env:
          DIST_TAG: ${{ steps.dist_tag.outputs.tag }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
